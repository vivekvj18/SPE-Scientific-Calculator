---
- name: Deploy Calculator Container
  hosts: localhost
  become: true

  tasks:

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: 2001vivekjoshi/calculator-app
        tag: latest
        source: pull

    - name: Ensure container is replaced
      community.docker.docker_container:
        name: calculator-container
        image: 2001vivekjoshi/calculator-app:latest
        state: started
        recreate: true
        tty: true
        interactive: true