---
- name: Deploy Calculator Container
  hosts: localhost

  tasks:

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: 2001vivekjoshi/calculator-app
        tag: latest
        source: pull

    - name: Stop and remove existing container
      shell: sudo docker kill calculator-container; sudo docker rm calculator-container
      ignore_errors: true

    - name: Run new container
      shell: sudo docker run -d --name calculator-container --runtime=runc --restart always -it 2001vivekjoshi/calculator-app:latest